# Multi-Agent Trading System Configuration

trading:
  dry_run: false  # If true, queries LLMs and scans, but does not place real orders. Set to false to execute paper/live trades.

allocation:
  high_risk_pct: 0.30
  moderate_risk_pct: 0.40
  low_risk_pct: 0.30

llm:
  provider: "bedrock"  # Options: "bedrock" or "openai"
  model: "google.gemma-3-12b-it"  # Supported Bedrock model IDs, or OpenAI models like "gpt-4o"

broker:
  host: "127.0.0.1"
  port: 4001  # 4002 is paper trading port in IB Gateway, 4001 is live
  client_id: 88

risk:
  max_positions: 5
  max_capital_pct: 0.20  # Max 20% of capital in a single stock
  risk_per_trade_pct: 0.01  # Risk 1% of portfolio on any one trade
  min_stop_loss_pct: 0.05  # Minimum 5% stop loss distance
  max_stop_loss_pct: 0.07  # Maximum 7% stop loss distance
  trail_trigger_pct: 0.03  # Return threshold to activate trailing stop/take profit

watchlist:
  - "AAPL"
  - "MSFT"
  - "NVDA"
  - "AMZN"
  - "GOOG"
  - "TSLA"
  - "META"
  - "AMD"
  - "NFLX"
  - "AVGO"
  - "COST"
  - "QCOM"
  - "INTC"
  - "MU"
  - "MRVL"
  - "PYPL"
  - "ADBE"
  - "NFLX"
  - "ORCL"
  - "CSCO"

scheduler:
  interval_minutes: 30

rules:
  min_technical_score: 5.0
  min_fundamental_score: 5.0
  min_news_score: 5.0
  earnings_shield_days: 3
  growth_reinvestment_rules:
    enabled: true
    min_growth_score: 6.5
    min_rnd_intensity_pct: 10.0
    min_revenue_growth_pct: 15.0

tier_rules:
  high:
    guidelines: "High-beta, high-growth technology, biotech, or emerging stocks with high volatility."
    min_rsi: 45
    max_rsi: 70
    require_trend: true
  moderate:
    guidelines: "Stable growth stocks, mid-large cap leaders with solid earnings and moderate volatility."
    min_rsi: 45
    max_rsi: 70
    require_trend: true
  low:
    guidelines: "Low-beta, defensive stocks, utilities, consumer staples, or high-quality dividend payers."
    min_rsi: 40
    max_rsi: 65
    require_trend: false

